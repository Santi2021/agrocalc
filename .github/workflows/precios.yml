name: Actualizar Precios Agro

on:
  schedule:
    - cron: '*/30 * * * *'  # Cada 30 minutos
  workflow_dispatch:          # También manual desde GitHub

jobs:
  fetch-precios:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # Para commitear el JSON

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install yfinance pandas

      - name: Fetch precios y generar JSON
        run: python scripts/fetch_precios.py

      - name: Commitear precios actualizados
        run: |
          git config user.name "AgroCalc Bot"
          git config user.email "bot@agrocalc.com"
          git add data/precios.json
          git diff --staged --quiet || git commit -m "⚡ Precios actualizados $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
